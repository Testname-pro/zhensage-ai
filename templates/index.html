<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帧神AI — Zhensage AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           Design Tokens
           ============================================================ */
        :root {
            --bg-sidebar: #0e0e0e;
            --bg-main: #171717;
            --bg-elevated: #2a2a2a;
            --bg-input: #2f2f2f;
            --bg-hover: #3a3a3a;
            --bg-active: #404040;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent: #c084fc;
            --accent-dim: rgba(192, 132, 252, 0.12);
            --accent-glow: rgba(192, 132, 252, 0.25);
            --border: rgba(255, 255, 255, 0.06);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 9999px;
            --font-display: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', 'Space Grotesk', sans-serif;
            --sidebar-width: 260px;
            --header-height: 52px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================================
           Reset & Base
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            background: var(--bg-main);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 2px; }

        /* ============================================================
           App Shell — Sidebar + Main
           ============================================================ */
        .app {
            display: flex;
            height: 100vh;
        }

        /* ============================================================
           Sidebar
           ============================================================ */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            transition: transform 0.3s ease;
            z-index: 20;
        }

        .sidebar-header {
            padding: 14px 16px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .logo-text .brand-zh {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .logo-text .brand-en {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            font-family: var(--font-display);
            letter-spacing: 0.5px;
        }

        /* Nav items */
        .nav-section {
            padding: 6px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            color: var(--text-secondary);
            transition: background var(--transition), color var(--transition);
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .nav-item.active { background: var(--bg-active); color: var(--text-primary); }
        .nav-item .nav-icon { width: 20px; text-align: center; font-size: 15px; flex-shrink: 0; opacity: 0.7; }
        .nav-item:hover .nav-icon { opacity: 1; }

        .nav-divider {
            height: 1px;
            background: var(--border);
            margin: 6px 12px;
        }

        /* Recent chats */
        .recent-header {
            padding: 8px 22px 4px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .recent-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
        }

        .recent-item {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background var(--transition), color var(--transition);
        }

        .recent-item:hover { background: var(--bg-hover); color: var(--text-primary); }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .model-badge {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-display);
        }

        .plan-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 2px 8px;
            border-radius: var(--radius-pill);
        }

        /* ============================================================
           Main Area
           ============================================================ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        /* Top bar */
        .topbar {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-toggle {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
            transition: background var(--transition), color var(--transition);
        }

        .sidebar-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: background var(--transition);
        }

        .model-selector:hover { background: var(--bg-hover); }
        .model-selector .chevron { font-size: 10px; color: var(--text-muted); }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-btn {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-secondary);
            transition: background var(--transition), color var(--transition);
        }

        .topbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ============================================================
           Chat Content
           ============================================================ */
        .chat-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Welcome state */
        .welcome-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 24px;
        }

        .welcome-logo {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .welcome-heading {
            font-size: 26px;
            font-weight: 400;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: -0.3px;
        }

        .welcome-slogan {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
            letter-spacing: 0.3px;
        }

        /* Messages */
        .messages-wrapper {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 20px 0;
            gap: 6px;
        }

        .messages-wrapper.active { display: flex; }

        .msg-row {
            display: flex;
            justify-content: center;
            padding: 0 24px;
            animation: msgIn 0.3s ease-out;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble {
            max-width: 680px;
            width: 100%;
            padding: 12px 18px;
            border-radius: var(--radius-lg);
            font-size: 14.5px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg-row.user .msg-bubble {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .msg-row.ai .msg-bubble {
            background: transparent;
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        /* Typing indicator */
        .typing-row {
            display: none;
            justify-content: center;
            padding: 0 24px;
            animation: msgIn 0.3s ease-out;
        }

        .typing-row.show { display: flex; }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 14px 20px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: dotPulse 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.9); }
            30% { opacity: 1; transform: scale(1.1); }
        }

        /* ============================================================
           Input Area
           ============================================================ */
        .input-area {
            padding: 0 24px 24px;
            flex-shrink: 0;
        }

        .input-container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-input);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 10px 14px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .input-container:focus-within {
            border-color: rgba(192, 132, 252, 0.3);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .input-container textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14.5px;
            font-family: var(--font-body);
            resize: none;
            min-height: 24px;
            max-height: 160px;
            line-height: 1.5;
            padding: 2px 0;
        }

        .input-container textarea::placeholder { color: var(--text-muted); }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            padding-bottom: 2px;
        }

        .input-icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-muted);
            transition: background var(--transition), color var(--transition);
        }

        .input-icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--text-primary);
            color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: opacity var(--transition), transform var(--transition);
        }

        .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

        .input-footer {
            max-width: 700px;
            margin: 8px auto 0;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ============================================================
           Mobile Overlay
           ============================================================ */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 15;
        }

        .sidebar-overlay.show { display: block; }

        /* ============================================================
           Responsive
           ============================================================ */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 25;
            }

            .sidebar.open { transform: translateX(0); }

            .msg-bubble { font-size: 16px; }
            .input-area { padding: 0 14px 16px; }
            .welcome-heading { font-size: 22px; }
        }

        @media (min-width: 769px) {
            .sidebar.collapsed { transform: translateX(-100%); margin-left: calc(-1 * var(--sidebar-width)); }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-mark">帧</div>
            <div class="logo-text">
                <span class="brand-zh">帧神AI</span>
                <span class="brand-en">Zhensage AI</span>
            </div>
        </div>

        <div class="nav-section">
            <button class="nav-item" onclick="newChat()">
                <span class="nav-icon">○</span> 新聊天
            </button>
            <button class="nav-item">
                <span class="nav-icon">🔍</span> 搜索聊天
            </button>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <button class="nav-item">
                <span class="nav-icon">📚</span> 知识库
            </button>
            <button class="nav-item">
                <span class="nav-icon">⭐</span> 常用
            </button>
            <button class="nav-item">
                <span class="nav-icon">🧪</span> 深度研究
            </button>
            <button class="nav-item">
                <span class="nav-icon">⚡</span> Codex
            </button>
        </div>

        <div class="nav-divider"></div>

        <div class="recent-header">最近</div>
        <div class="recent-list" id="recentList">
            <div class="recent-item">角色待机图片生成</div>
            <div class="recent-item">立绘创作请求限制</div>
            <div class="recent-item">代码修改与完善</div>
            <div class="recent-item">战锤封面设计</div>
            <div class="recent-item">高三数学拓展知识</div>
        </div>

        <div class="sidebar-footer">
            <span class="model-badge">Zhensage-1.24B</span>
            <span class="plan-badge">Beta</span>
        </div>
    </aside>

    <!-- Main -->
    <div class="main">
        <!-- Top bar -->
        <div class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebarToggle" title="切换侧栏">☰</button>
                <div class="model-selector">
                    帧神AI <span class="chevron">▾</span>
                </div>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn" title="设置">⚙</button>
                <div class="user-avatar">U</div>
            </div>
        </div>

        <!-- Chat content -->
        <div class="chat-content" id="chatContent">
            <!-- Welcome state -->
            <div class="welcome-state" id="welcomeState">
                <div class="welcome-logo">帧</div>
                <h1 class="welcome-heading">你今天在想些什么？</h1>
                <p class="welcome-slogan">以帧造物，即是真神 — Build all things by frames, be the ultimate sage</p>
            </div>

            <!-- Messages -->
            <div class="messages-wrapper" id="messagesWrapper"></div>

            <!-- Typing -->
            <div class="typing-row" id="typingRow">
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-container">
                <textarea id="msgInput" rows="1" placeholder="有问题，尽管问" autocomplete="off"></textarea>
                <div class="input-actions">
                    <button class="input-icon-btn" title="上传">📎</button>
                    <button class="send-btn" id="sendBtn" title="发送">↑</button>
                </div>
            </div>
            <div class="input-footer">帧神AI 可能会产生不准确的信息，请注意甄别</div>
        </div>
    </div>
</div>

<script>
    /* ============================================================
       DOM
       ============================================================ */
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const welcomeState = document.getElementById('welcomeState');
    const messagesWrapper = document.getElementById('messagesWrapper');
    const typingRow = document.getElementById('typingRow');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const recentList = document.getElementById('recentList');

    let isSending = false;
    let chatHistory = [];

    /* ============================================================
       Sidebar Toggle
       ============================================================ */
    function toggleSidebar() {
        const isMobile = window.innerWidth <= 768;
        if (isMobile) {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    sidebarToggle.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', function () {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    });

    /* ============================================================
       New Chat
       ============================================================ */
    function newChat() {
        chatHistory = [];
        messagesWrapper.innerHTML = '';
        messagesWrapper.classList.remove('active');
        welcomeState.style.display = 'flex';
        msgInput.value = '';
        msgInput.focus();
        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        }
    }

    /* ============================================================
       Auto-resize textarea
       ============================================================ */
    msgInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    });

    /* ============================================================
       Scroll to bottom
       ============================================================ */
    function scrollBottom() {
        const el = document.querySelector('.chat-content');
        requestAnimationFrame(function () { el.scrollTop = el.scrollHeight; });
    }

    /* ============================================================
       Add message to UI
       ============================================================ */
    function addMessage(text, type) {
        welcomeState.style.display = 'none';
        messagesWrapper.classList.add('active');

        var row = document.createElement('div');
        row.className = 'msg-row ' + type;
        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;
        row.appendChild(bubble);
        messagesWrapper.appendChild(row);
        scrollBottom();
    }

    function showTyping() { typingRow.classList.add('show'); scrollBottom(); }
    function hideTyping() { typingRow.classList.remove('show'); }

    /* ============================================================
       Add to recent list
       ============================================================ */
    function addToRecent(text) {
        var item = document.createElement('div');
        item.className = 'recent-item';
        item.textContent = text.substring(0, 30) + (text.length > 30 ? '...' : '');
        recentList.insertBefore(item, recentList.firstChild);
        if (recentList.children.length > 20) recentList.removeChild(recentList.lastChild);
    }

    /* ============================================================
       Send message
       ============================================================ */
    async function sendMessage() {
        var text = msgInput.value.trim();
        if (!text || isSending) return;

        isSending = true;
        sendBtn.disabled = true;
        msgInput.value = '';
        msgInput.style.height = 'auto';

        addMessage(text, 'user');
        showTyping();

        try {
            var res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            var data = await res.json();

            setTimeout(function () {
                hideTyping();
                if (data.reply) {
                    addMessage(data.reply, 'ai');
                    addToRecent(text);
                } else {
                    addMessage('抱歉，出了点问题，请稍后再试。', 'ai');
                }
                isSending = false;
                sendBtn.disabled = false;
                msgInput.focus();
            }, 250 + Math.random() * 350);

        } catch (err) {
            hideTyping();
            addMessage('网络连接失败，请检查网络后重试。', 'ai');
            isSending = false;
            sendBtn.disabled = false;
            msgInput.focus();
        }
    }

    /* ============================================================
       Event bindings
       ============================================================ */
    msgInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.focus();
</script>

</body>
</html>
